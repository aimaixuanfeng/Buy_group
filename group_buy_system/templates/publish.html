{% extends "base.html" %}

{% block title %}发布拼单{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4><i class="fas fa-plus-circle"></i> 发布新拼单</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" id="publish-form">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">拼单标题 *</label>
                                <input type="text" name="title" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">分类 *</label>
                                <select name="category_id" class="form-select" required>
                                    <option value="">请选择</option>
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="详细描述拼单内容..."></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">取货地点 *</label>
                                <input type="text" name="pickup_location" class="form-control" placeholder="如：南区食堂门口" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">截止时间 *</label>
                                <input type="datetime-local" name="deadline" id="deadline" class="form-control" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">拼单图片</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>

                    <hr>
                    <h5><i class="fas fa-box"></i> 商品项</h5>
                    <div id="items-container">
                        <div class="item-row row g-3 mb-3">
                            <div class="col-md-4">
                                <input type="text" name="item_name[]" class="form-control" placeholder="商品名称" required>
                            </div>
                            <div class="col-md-3">
                                <input type="number" name="item_price[]" class="form-control" placeholder="单价(元)" step="0.01" required>
                            </div>
                            <div class="col-md-3">
                                <input type="number" name="item_stock[]" class="form-control" placeholder="库存数量" required>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-danger remove-item">删除</button>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="add-item" class="btn btn-sm btn-outline-primary mb-3"><i class="fas fa-plus"></i> 添加商品项</button>

                    <div class="text-center mt-3">
                        <button type="submit" class="btn btn-success btn-lg px-5">发布拼单</button>
                        <a href="{{ url_for('user_routes.index') }}" class="btn btn-secondary btn-lg px-5">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('items-container');
    const addBtn = document.getElementById('add-item');
    const form = document.getElementById('publish-form');
    const deadlineInput = document.getElementById('deadline');

    // 设置截止时间的最小值为当前时间
    function setMinDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
        deadlineInput.setAttribute('min', minDateTime);
    }
    setMinDateTime();

    // 添加商品项
    addBtn.addEventListener('click', function() {
        const firstRow = document.querySelector('.item-row');
        if (!firstRow) return;
        const newRow = firstRow.cloneNode(true);
        newRow.querySelectorAll('input').forEach(input => input.value = '');
        container.appendChild(newRow);
    });

    // 删除商品项（事件委托）
    container.addEventListener('click', function(e) {
        const delBtn = e.target.closest('.remove-item');
        if (delBtn) {
            const row = delBtn.closest('.item-row');
            const rows = document.querySelectorAll('.item-row');
            if (rows.length > 1) {
                row.remove();
            } else {
                alert('至少需要一个商品项');
            }
        }
    });

    // 表单提交前校验
    form.addEventListener('submit', function(e) {
        // 校验截止时间
        const deadlineValue = deadlineInput.value;
        if (deadlineValue) {
            const selectedTime = new Date(deadlineValue);
            const now = new Date();
            if (selectedTime <= now) {
                alert('截止时间必须晚于当前时间');
                e.preventDefault();
                return;
            }
        } else {
            alert('请填写截止时间');
            e.preventDefault();
            return;
        }

        // 校验商品项
        const items = [];
        const rows = document.querySelectorAll('.item-row');
        for (let row of rows) {
            const name = row.querySelector('input[name="item_name[]"]').value.trim();
            const price = row.querySelector('input[name="item_price[]"]').value.trim();
            const stock = row.querySelector('input[name="item_stock[]"]').value.trim();
            if (name && price && stock) {
                items.push({
                    name: name,
                    price: parseFloat(price),
                    stock: parseInt(stock)
                });
            }
        }
        if (items.length === 0) {
            alert('请至少填写一个完整的商品项（名称、单价、库存）');
            e.preventDefault();
            return;
        }
        // 添加隐藏字段 items_json
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'items_json';
        hiddenInput.value = JSON.stringify(items);
        form.appendChild(hiddenInput);
    });
});
</script>
{% endblock %}

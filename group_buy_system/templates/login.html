{% extends "base.html" %}

{% block title %}登录 - 校园拼单{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-sign-in-alt"></i> 用户登录</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <!-- 新增角色选择 -->
                    <div class="mb-3">
                        <label class="form-label">登录身份</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleUser" value="user" checked>
                                <label class="form-check-label" for="roleUser">普通用户</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="roleAdmin" value="admin">
                                <label class="form-check-label" for="roleAdmin">管理员</label>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登 录</button>
                </form>
                <hr>
                <p class="text-center mb-0">还没有账号？ <a href="{{ url_for('user_routes.register') }}">立即注册</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

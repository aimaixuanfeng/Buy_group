{% extends "base.html" %}

{% block title %}编辑拼单{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning text-white">
                <h4><i class="fas fa-edit"></i> 编辑拼单</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data" id="edit-form">
                    <div class="mb-3">
                        <label class="form-label">拼单标题</label>
                        <input type="text" name="title" class="form-control" value="{{ group.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea name="description" class="form-control" rows="3">{{ group.description }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">取货地点</label>
                                <input type="text" name="pickup_location" class="form-control" value="{{ group.pickup_location }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">截止时间</label>
                                <input type="datetime-local" name="deadline" id="deadline" class="form-control" value="{{ group.deadline.strftime('%Y-%m-%dT%H:%M') }}" required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">拼单图片（留空则不变）</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                        {% if group.image %}<small>当前图片：<a href="{{ group.image }}" target="_blank">查看</a></small>{% endif %}
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-warning">保存修改</button>
                        <a href="{{ url_for('group_routes.detail', group_id=group.id) }}" class="btn btn-secondary">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const deadlineInput = document.getElementById('deadline');
    const form = document.getElementById('edit-form');

    // 设置截止时间的最小值为当前时间
    function setMinDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const minDateTime = `${year}-${month}-${day}T${hours}:${minutes}`;
        deadlineInput.setAttribute('min', minDateTime);
    }
    setMinDateTime();

    // 如果原截止时间已经过期，给出警告（但用户可以修改）
    const originalDeadline = deadlineInput.value;
    if (originalDeadline) {
        const originalTime = new Date(originalDeadline);
        const now = new Date();
        if (originalTime <= now) {
            console.warn('原截止时间已过期，请修改');
            // 可选：显示提示，但不自动阻止，因为用户可能还未修改
            // 我们将在提交时检查
        }
    }

    // 表单提交前校验截止时间
    form.addEventListener('submit', function(e) {
        const deadlineValue = deadlineInput.value;
        if (deadlineValue) {
            const selectedTime = new Date(deadlineValue);
            const now = new Date();
            if (selectedTime <= now) {
                alert('截止时间必须晚于当前时间');
                e.preventDefault();
                return;
            }
        } else {
            alert('请填写截止时间');
            e.preventDefault();
            return;
        }
    });
});
</script>
{% endblock %}
